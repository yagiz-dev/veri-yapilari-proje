server {
    listen 80;

    # Statik dosyaları (HTML, CSS, JS) servis et
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # /api ile başlayan tüm istekleri backend konteynerine (C# Web API) yönlendir
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # CORS sorunlarını önlemek için başlıklar eklenebilir, 
        # ancak proxy ile aynı port (80) üzerinden geçtiği için tarayıcı CORS hatası vermeyecektir.
    }
}
